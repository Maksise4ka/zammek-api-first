global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'aspnetcore-monitor'

scrape_configs:
  - job_name: 'aspnetcore-app'
    static_configs:
      - targets: ['host.docker.internal:5176']
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 3s
    scheme: http

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']